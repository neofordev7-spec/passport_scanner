<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>MRZ Reader - Customs Control</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#00c753",
                        "background-light": "#f8fafc",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #00c753, transparent);
            box-shadow: 0 0 10px #00c753;
            animation: scan 1.5s infinite linear;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .loader {
            border-top-color: #00c753;
            animation: spinner 1s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body class="bg-background-light font-display text-slate-900 antialiased min-h-screen">
    <div class="relative flex h-auto min-h-screen w-full flex-col justify-center items-center">
        <div class="w-full max-w-[600px] flex-1 flex flex-col bg-white shadow-2xl md:my-10 md:rounded-3xl overflow-hidden border border-slate-200">

            <header class="flex items-center justify-between border-b border-slate-100 px-6 py-4 bg-white shrink-0">
                <div class="flex items-center gap-3">
                    <div class="size-8 bg-primary/10 rounded-lg flex items-center justify-center text-primary">
                        <span class="material-symbols-outlined !text-2xl">verified_user</span>
                    </div>
                    <h2 class="text-slate-900 text-lg font-bold tracking-tight">Customs Control</h2>
                </div>
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] bg-slate-100 px-3 py-1 rounded-md">
                    v4.2.0-TRM
                </div>
            </header>

            <div id="scanner-section" class="flex-1 flex flex-col relative overflow-hidden">
                <div class="p-6">
                    <div class="flex flex-col gap-1 mb-6">
                        <p class="text-slate-900 text-2xl font-black uppercase tracking-tight">Passport Scan</p>
                        <p class="text-primary font-bold text-[10px] uppercase tracking-widest">MRZ Detection Active</p>
                    </div>

                    <div class="relative flex items-center justify-center aspect-[4/3] rounded-2xl bg-black overflow-hidden border-2 border-slate-100 shadow-inner">
                        <video id="camera-stream" autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover"></video>
                        <canvas id="canvas-preview" class="hidden absolute inset-0 w-full h-full object-contain bg-black"></canvas>

                        <div class="absolute inset-0 bg-black/60 pointer-events-none"></div>
                        
                        <div id="mrz-target" class="absolute bottom-12 left-1/2 -translate-x-1/2 w-[90%] h-14 z-10 border-2 border-primary rounded-lg overflow-hidden bg-transparent shadow-[0_0_0_9999px_rgba(0,0,0,0.5)]">
                            <div class="scan-line absolute w-full top-0"></div>
                        </div>

                        <div class="absolute top-4 left-1/2 -translate-x-1/2 text-white/50 text-[9px] font-bold uppercase tracking-widest pointer-events-none">
                            Align 2 lines of code here
                        </div>
                    </div>
                </div>

                <div class="px-6 pb-8 mt-auto">
                    <button id="capture-btn" class="w-full flex items-center justify-center rounded-2xl h-16 bg-primary text-white text-lg font-black tracking-widest hover:bg-[#00b34a] active:scale-[0.97] transition-all shadow-xl shadow-primary/30 uppercase">
                        <span class="material-symbols-outlined mr-3 text-2xl">center_focus_strong</span>
                        Read MRZ
                    </button>
                    
                    <div id="loading-overlay" class="hidden absolute inset-0 bg-white/95 backdrop-blur-md z-20 flex flex-col items-center justify-center">
                        <div class="w-12 h-12 border-4 border-slate-200 rounded-full loader mb-4"></div>
                        <p class="text-slate-900 font-black uppercase tracking-widest animate-pulse">Analyzing...</p>
                    </div>
                </div>
            </div>

            <div id="results-section" class="hidden flex-1 flex flex-col bg-white overflow-y-auto">
                <div class="flex flex-col items-center justify-center py-10 bg-slate-50 border-b border-slate-100">
                    <div class="size-20 bg-primary rounded-full flex items-center justify-center text-white mb-4 shadow-2xl shadow-primary/30">
                        <span class="material-symbols-outlined text-[42px]">fact_check</span>
                    </div>
                    <h1 class="text-primary tracking-[0.3em] text-4xl font-black uppercase">Pass</h1>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">Identification Verified</p>
                </div>

                <div class="px-8 py-8 space-y-6">
                    <div class="grid grid-cols-2 gap-8">
                        <div class="space-y-1">
                            <p class="text-slate-400 text-[9px] font-black uppercase tracking-widest">Passport Number</p>
                            <p id="res-number" class="text-primary text-xl font-black">-</p>
                        </div>
                        <div class="space-y-1">
                            <p class="text-slate-400 text-[9px] font-black uppercase tracking-widest">PINFL (JSHSHIR)</p>
                            <p id="res-pinfl" class="text-primary text-xl font-black tracking-tighter">-</p>
                        </div>
                        <div class="col-span-2 space-y-1 border-t border-slate-50 pt-4">
                            <p class="text-slate-400 text-[9px] font-black uppercase tracking-widest">Full Name</p>
                            <p class="text-slate-900 text-xl font-black"><span id="res-surname">-</span> <span id="res-names">-</span></p>
                        </div>
                        <div class="space-y-1 border-t border-slate-50 pt-4">
                            <p class="text-slate-400 text-[9px] font-black uppercase tracking-widest">Date of Expiry</p>
                            <p id="res-expiry" class="text-slate-800 text-lg font-bold">-</p>
                        </div>
                        <div class="space-y-1 border-t border-slate-50 pt-4">
                            <p class="text-slate-400 text-[9px] font-black uppercase tracking-widest">Sex</p>
                            <p id="res-sex" class="text-slate-800 text-lg font-bold">-</p>
                        </div>
                    </div>
                </div>

                <div class="p-6 bg-slate-50 border-t border-slate-100 mt-auto">
                    <button id="scan-another-btn" class="w-full flex items-center justify-center gap-3 h-14 bg-slate-900 text-white font-black rounded-xl hover:bg-black transition-all uppercase tracking-widest">
                        <span class="material-symbols-outlined">restart_alt</span>
                        New Scan
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const video = document.getElementById('camera-stream');
        const canvasPreview = document.getElementById('canvas-preview');
        const captureBtn = document.getElementById('capture-btn');
        const scanAnotherBtn = document.getElementById('scan-another-btn');
        const loadingOverlay = document.getElementById('loading-overlay');
        const scannerSection = document.getElementById('scanner-section');
        const resultsSection = document.getElementById('results-section');
        const mrzTarget = document.getElementById('mrz-target');
        
        let stream = null;

        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Kameraga ruxsat bering (HTTPS yoki localhost talab qilinadi).");
            }
        }

        captureBtn.addEventListener('click', async () => {
            if (!video.videoWidth) return;

            // 1. Koordinatalarni hisoblash
            const vRect = video.getBoundingClientRect();
            const tRect = mrzTarget.getBoundingClientRect();

            const scaleX = video.videoWidth / vRect.width;
            const scaleY = video.videoHeight / vRect.height;

            const sx = (tRect.left - vRect.left) * scaleX;
            const sy = (tRect.top - vRect.top) * scaleY;
            const sw = tRect.width * scaleX;
            const sh = tRect.height * scaleY;

            // 2. Faqat MRZ zonani qirqib olish (Crop)
            const canvas = document.createElement('canvas');
            canvas.width = sw;
            canvas.height = sh;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

            // Vizual ko'rinishni muzlatish
            loadingOverlay.classList.remove('hidden');
            canvasPreview.width = sw;
            canvasPreview.height = sh;
            canvasPreview.getContext('2d').drawImage(canvas, 0, 0);
            canvasPreview.classList.remove('hidden');
            video.classList.add('hidden');

            // 3. Blob ko'rinishida serverga yuborish
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'mrz_crop.jpg');

                try {
                    const response = await fetch('/scan', { method: 'POST', body: formData });
                    const result = await response.json();
                    
                    if(result.success) {
                        displayResults(result.data);
                    } else {
                        alert("Kod o'qilmadi. Iltimos, faqat MRZ qatorlarini ramkaga to'g'irlang.");
                        resetScanner();
                    }
                } catch (err) {
                    alert("Aloqa xatosi.");
                    resetScanner();
                } finally {
                    loadingOverlay.classList.add('hidden');
                }
            }, 'image/jpeg', 0.95);
        });

        function displayResults(data) {
            scannerSection.classList.add('hidden');
            resultsSection.classList.remove('hidden');
            
            document.getElementById('res-number').textContent = data.number || 'N/A';
            document.getElementById('res-pinfl').textContent = data.PINFL || 'N/A';
            document.getElementById('res-surname').textContent = data.surname || '';
            document.getElementById('res-names').textContent = data.names || '';
            document.getElementById('res-sex').textContent = data.sex || 'N/A';
            document.getElementById('res-expiry').textContent = data.expiration_date || 'N/A';
        }

        function resetScanner() {
            resultsSection.classList.add('hidden');
            scannerSection.classList.remove('hidden');
            canvasPreview.classList.add('hidden');
            video.classList.remove('hidden');
            if(!stream) initCamera();
        }

        scanAnotherBtn.addEventListener('click', resetScanner);
        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
